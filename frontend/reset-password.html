<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - EcoWallet</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body class="landing">
    <nav class="navbar landing-nav">
        <div class="container landing-nav-inner">
            <a class="brand" href="index.html" aria-label="EcoWallet Home">
                <img class="brand-logo brand-logo--full" src="assets/ecowallet-logo.png" alt="EcoWallet logo">
                <span class="brand-text">EcoWallet</span>
            </a>
            <div class="nav-actions navbar-menu">
                <a href="services.html" class="btn btn-ghost btn-pill">Services</a>
                <a href="about.html" class="btn btn-ghost btn-pill">About</a>
                <a href="login.html" class="btn btn-ghost btn-pill">Login</a>
                <a href="register.html" class="btn btn-primary btn-pill">Create Account</a>
            </div>
            <button class="navbar-toggle" id="navbar-toggle" aria-label="Toggle navigation">
                <span class="bar"></span>
                <span class="bar"></span>
                <span class="bar"></span>
            </button>
        </div>
    </nav>

    <div class="auth-container">
        <div class="auth-card">
            <h2>Create a New Password</h2>
            <p>Enter your reset token and choose a new password.</p>

            <form id="resetConfirmForm" class="form">
                <div class="form-group">
                    <label for="resetToken">Reset Token</label>
                    <input
                        type="text"
                        id="resetToken"
                        name="resetToken"
                        placeholder="Paste your reset token"
                        required
                    >
                </div>

                <div class="form-group">
                    <label for="password">New Password</label>
                    <input
                        type="password"
                        id="password"
                        name="password"
                        placeholder="Enter new password"
                        required
                    >
                </div>

                <div class="form-group">
                    <label for="confirmPassword">Confirm New Password</label>
                    <input
                        type="password"
                        id="confirmPassword"
                        name="confirmPassword"
                        placeholder="Confirm new password"
                        required
                    >
                </div>

                <div id="errorMessage" class="error-message" style="display: none;"></div>
                <div id="successMessage" class="success-message" style="display: none;"></div>

                <button type="submit" class="btn btn-primary btn-block btn-pill">Reset Password</button>
            </form>

            <p class="auth-footer">
                Remember your password? <a href="login.html">Back to login</a>
            </p>
        </div>
    </div>

    <script src="js/nav.js"></script>
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>
