<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - EcoWallet</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body class="landing">
    <nav class="navbar landing-nav">
        <div class="container landing-nav-inner">
            <a class="brand" href="index.html" aria-label="EcoWallet Home">
                <span class="brand-mark" aria-hidden="true">
                    <svg viewBox="0 0 32 32" role="img" aria-hidden="true">
                        <path d="M26 6c-8 1-14 5-18 12-2 4-2 8-2 12 5-1 9-3 13-6 6-4 8-10 7-18z" fill="#E8F4E2"/>
                        <path d="M8 26c6-2 12-6 16-12" fill="none" stroke="#0E3B21" stroke-width="2" stroke-linecap="round"/>
                    </svg>
                </span>
                <span class="brand-text">EcoWallet</span>
            </a>
            <div class="nav-actions">
                <a href="admin-login.html" class="btn btn-ghost btn-pill">Admin Login</a>
                <a href="register.html" class="btn btn-primary btn-pill">Create Account</a>
            </div>
        </div>
    </nav>

    <div class="auth-container">
        <div class="auth-card">
            <h2>Welcome Back</h2>
            <p>Sign in to your EcoWallet account</p>
            
            <form id="loginForm" class="form">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input 
                        type="email" 
                        id="email" 
                        name="email" 
                        placeholder="your.email@example.com"
                        required
                    >
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input 
                        type="password" 
                        id="password" 
                        name="password" 
                        placeholder="Enter your password"
                        required
                    >
                </div>

                <div id="errorMessage" class="error-message" style="display: none;"></div>

                <button type="submit" class="btn btn-primary btn-block btn-pill">Login</button>
            </form>

            <p class="auth-footer">
                Don't have an account? <a href="register.html">Register here</a>
            </p>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>
