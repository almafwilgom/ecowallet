<!DOCTYPE html>
<html lang="en">
<head>
    <base href="/">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - EcoWallet</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <div class="navbar-brand">
                <a class="brand" href="index.html" aria-label="EcoWallet Home">
                    <img class="brand-logo brand-logo--full" src="assets/ecowallet-logo.png" alt="EcoWallet logo">
                    <span class="brand-text">EcoWallet</span>
                </a>
            </div>
            <div class="navbar-menu">
                <a href="index.html" class="nav-link">Home</a>
                <a href="services.html" class="nav-link">Services</a>
                <a href="about.html" class="nav-link">About</a>
                <a href="#" id="logoutBtn" class="btn btn-outline btn-sm">Logout</a>
            </div>
            <button class="navbar-toggle" id="navbar-toggle" aria-label="Toggle navigation">
                <span class="bar"></span>
                <span class="bar"></span>
                <span class="bar"></span>
            </button>
        </div>
    </nav>

    <div class="auth-container">
        <div class="auth-card">
            <h2>Admin Login</h2>
            <p>Sign in to manage EcoWallet.</p>

            <form id="loginForm" class="form">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input
                        type="email"
                        id="email"
                        name="email"
                        placeholder="admin@example.com"
                        required
                    >
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input
                        type="password"
                        id="password"
                        name="password"
                        placeholder="Enter your password"
                        required
                    >
                </div>

                <div class="auth-links">
                    <a href="forgot-password.html">Forgot password?</a>
                </div>

                <div id="sessionMessage" class="form-message success" style="display: none;"></div>
                <div id="errorMessage" class="error-message" style="display: none;"></div>

                <button type="submit" class="btn btn-primary btn-block">Login</button>
            </form>

            <div class="auth-divider"><span>or</span></div>
            <div id="googleLoginButton" class="google-login"></div>

            <p class="auth-footer">
                Not an admin? <a href="login.html">User login</a>
            </p>
        </div>
    </div>

    <script src="js/config.js"></script>
    <script src="js/nav.js"></script>
    <script type="module" src="js/api.js"></script>
    <script type="module" src="js/auth.js"></script>
</body>
</html>
