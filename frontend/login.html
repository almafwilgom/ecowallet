<!DOCTYPE html>
<html lang="en">
<head>
    <base href="/">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - EcoWallet</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body class="landing">
    <nav class="navbar landing-nav">
        <div class="container landing-nav-inner">
            <a class="brand" href="index.html" aria-label="EcoWallet Home">
                <img class="brand-logo brand-logo--full" src="assets/ecowallet-logo.png" alt="EcoWallet logo">
                <span class="brand-text">EcoWallet</span>
            </a>
            <div class="nav-actions navbar-menu">
                <a href="services.html" class="btn btn-ghost btn-pill">Services</a>
                <a href="about.html" class="btn btn-ghost btn-pill">About</a>
                <a href="admin-login.html" class="btn btn-ghost btn-pill">Admin Login</a>
                <a href="register.html" class="btn btn-primary btn-pill">Create Account</a>
                <a href="#" id="logoutBtn" class="btn btn-outline btn-pill">Logout</a>
            </div>
            <button class="navbar-toggle" id="navbar-toggle" aria-label="Toggle navigation">
                <span class="bar"></span>
                <span class="bar"></span>
                <span class="bar"></span>
            </button>
        </div>
    </nav>

    <div class="auth-container">
        <div class="auth-card">
            <h2>Welcome Back</h2>
            <p>Sign in to your EcoWallet account</p>
            
            <form id="loginForm" class="form">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input 
                        type="email" 
                        id="email" 
                        name="email" 
                        placeholder="your.email@example.com"
                        required
                    >
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input 
                        type="password" 
                        id="password" 
                        name="password" 
                        placeholder="Enter your password"
                        required
                    >
                </div>

                <div class="auth-links">
                    <a href="forgot-password.html">Forgot password?</a>
                </div>

                <div id="sessionMessage" class="form-message success" style="display: none;"></div>
                <div id="errorMessage" class="error-message" style="display: none;"></div>

                <button type="submit" class="btn btn-primary btn-block btn-pill">Login</button>
            </form>

            <div class="auth-divider"><span>or</span></div>
            <div id="googleLoginButton" class="google-login"></div>

            <p class="auth-footer">
                Don't have an account? <a href="register.html">Register here</a>
            </p>
        </div>
    </div>

    <script src="js/config.js"></script>
    
    <script type="module" src="js/api.js"></script>
    
    <script src="js/nav.js"></script>
    <script type="module" src="js/auth.js"></script>
</body>
</html>
